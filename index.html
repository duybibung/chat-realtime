<!DOCTYPE html><html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>IUH Shop</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6fb;
    }
    header {
      background: #0d47a1;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }
    .container {
      padding: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 15px;
      text-align: center;
      transition: 0.3s;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    img {
      width: 100%;
      border-radius: 10px;
    }
    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      background: #0d47a1;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
    .cart {
      margin-top: 30px;
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body><header>🛍️ IUH SHOP</header><div class="container">
  <div class="grid" id="products"></div>  <div class="cart">
    <h2>🛒 Giỏ hàng</h2>
    <div id="cart"></div>
  </div>
</div><script>
  const products = [
    { name: "Áo IUH", price: "150.000đ", img: "https://via.placeholder.com/200" },
    { name: "Nón IUH", price: "80.000đ", img: "https://via.placeholder.com/200" },
    { name: "Balo IUH", price: "300.000đ", img: "https://via.placeholder.com/200" }
  ];

  const cart = [];

  const productDiv = document.getElementById("products");
  const cartDiv = document.getElementById("cart");

  products.forEach((p, index) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${p.img}" />
      <h3>${p.name}</h3>
      <p>${p.price}</p>
      <button onclick="addToCart(${index})">Thêm vào giỏ</button>
    `;

    productDiv.appendChild(card);
  });

  function addToCart(index) {
    cart.push(products[index]);
    renderCart();
  }

  function renderCart() {
    cartDiv.innerHTML = "";
    cart.forEach(item => {
      const div = document.createElement("div");
      div.textContent = item.name + " - " + item.price;
      cartDiv.appendChild(div);
    });
  }
</script></body>
</html>
