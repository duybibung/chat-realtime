<!DOCTYPE html><html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Chat Realtime + Login + Avatar</title>  <!-- Firebase (bản compat cho dễ dùng) -->  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>  <style>
    body {
      font-family: Arial;
      background: #eef2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .chat-box {
      width: 420px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .top-bar {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .messages {
      height: 300px;
      overflow-y: auto;
      padding: 10px;
    }
    .msg {
      display: flex;
      align-items: center;
      margin: 6px 0;
    }
    .msg img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      margin-right: 8px;
    }
    .input-box { display: flex; border-top: 1px solid #ddd; }
    input {
      flex: 1;
      padding: 10px;
      border: none;
    }
    button {
      padding: 10px;
      border: none;
      cursor: pointer;
    }
  </style></head>
<body><div class="chat-box">
  <div class="top-bar">
    <span id="userInfo">Chưa đăng nhập</span>
    <button onclick="login()">Login Google</button>
  </div>  <div class="messages" id="messages"></div>  <div class="input-box">
    <input type="text" id="input" placeholder="Nhập tin nhắn...">
    <button onclick="sendMessage()">Gửi</button>
  </div>
</div><script>
  // 🔥 Thay config của bạn vào đây
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT.firebaseio.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "XXX",
    appId: "XXX"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.database().ref("messages");

  let currentUser = null;

  function login() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider);
  }

  auth.onAuthStateChanged(user => {
    if (user) {
      currentUser = user;
      document.getElementById("userInfo").textContent = user.displayName;
    }
  });

  function sendMessage() {
    const text = document.getElementById("input").value;
    if (!currentUser || text.trim() === "") return;

    db.push({
      name: currentUser.displayName,
      text: text,
      avatar: currentUser.photoURL
    });

    document.getElementById("input").value = "";
  }

  db.on("child_added", snapshot => {
    const data = snapshot.val();
    const msgBox = document.getElementById("messages");

    const div = document.createElement("div");
    div.className = "msg";

    const img = document.createElement("img");
    img.src = data.avatar;

    const text = document.createElement("span");
    text.textContent = data.name + ": " + data.text;

    div.appendChild(img);
    div.appendChild(text);

    msgBox.appendChild(div);
    msgBox.scrollTop = msgBox.scrollHeight;
  });
</script></body>
</html>
